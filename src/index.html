<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>

  <link rel="stylesheet" href="style.css" />
  <script src="scripts/screen.js"></script>

</head>
<body>
  <header>
        <div class="menu">
          <a class="nav-main" onclick="change_menu_state('power-menu', 'block')"><img src="media/buttons/power-off.png"></a>
          <a class="nav-main" onclick="change_menu_state('setting-menu', 'block')"><img src="media/buttons/Settings.png"></a>
        </div>
  </header>

  <main>
        <div id="links-main">
          <h1 class="link-header">Home Links</h1>
          <ul>

            <div class="linker">
              <a href="https://www.youtube.com/">
              <img src="media/linkers-title/Youtube.png">
              </a>
              <h2>Title</h2>
              <style>
                .linker{
                  background-color: rgb(58, 58, 58);
                  width: 100%;
                  height: 100%;
                  display:grid;
                }
                .linker img{
                  width: 300px;
                  height: 200px;
                  object-fit: cover;
                }
                .linker h2{
                  position: relative;
                  left:40%;
                  color: aliceblue;
                }
              </style>
            </div>

            <div class="linker">
              <a href="https://www.youtube.com/" onclick="open_external()" target="_blank">
              <img src="media/linkers-title/Youtube.png">
              </a>
              <h2>Title</h2>
              <script>function open_external(){shell.open("firefox https://www.youtube.com/")}</script>
              <style>
                .linker{
                  background-color: rgb(58, 58, 58);
                  width: 100%;
                  height: 100%;
                  display:grid;
                }
                .linker img{
                  width: 300px;
                  height: 200px;
                  object-fit: cover;
                }
                .linker h2{
                  position: relative;
                  left:40%;
                  color: aliceblue;
                }
              </style>
            </div>


          </ul>
        </div>


        <div id="links-custom">  
          <h1 class="link-header">Custom Links</h1>
          <ul>
          </ul>
        </div>
  </main>

  <div class="Menus">
        <div id="settings-menu">
          <p>Settings</p>
          <button onclick="change_menu_state('setting-menu', 'none')">X</button>
        </div>
        
        
        <div id="user-menu">
          <p>User</p>
          <button onclick="change_menu_state('setting-menu', 'block')">X</button>
        </div>

        <div id="about-menu">
          <p>About</p>
          <button onclick="change_menu_state('setting-menu', 'block')">X</button>
        </div>

        <div id="power-menu">
          <button onclick="change_menu_state('setting-menu', 'block')">Close</button>
          <button onclick="change_menu_state('setting-menu', 'block')">Power Sleep</button>
          <button onclick="change_menu_state('setting-menu', 'block')">Power Off  </button>
        </div>
  </div>

</body>
</html>
